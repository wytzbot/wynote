name: wynote
description: WyNote - Flutter Note Taking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # OLD but stable Quill that works with Flutter 3.16
  flutter_quill: ^7.4.18
  flutter_quill_extensions: ^0.0.10
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
