name: wynote
description: WyNote - Flutter Note Taking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0' # Required for Flutter 3.22+

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Rich Text Editor - LATEST
  flutter_quill: ^9.5.0
  flutter_quill_extensions: ^9.3.4
  
  # Intl must match Flutter 3.24+
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
