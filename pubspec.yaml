name: wynote
description: A Flutter note-taking app with Hive and Quill
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1
  
  # Quill Editor - Updated versions
  flutter_quill: ^9.5.0
  flutter_quill_extensions: ^9.3.4
  intl: ^0.20.2

  # Other common ones
  provider: ^6.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
